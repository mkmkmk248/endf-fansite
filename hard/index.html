<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="難読漢字・超難問全15問のハードモードに挑戦！漢字の真の実力を試そう。">
  <title>ハードモード — 漢字検定ゲーム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;600;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    /* Hard mode accent override: red */
    :root {
      --accent:      #e87070;
      --accent-hover:#f08080;
      --accent-dim:  rgba(232,112,112,.10);
      --accent-glow: rgba(232,112,112,.20);
    }
    .btn--start {
      background: var(--accent);
      color: #fff;
    }
    .btn--start:hover {
      background: var(--accent-hover);
    }
    .landing__eyebrow { color: var(--accent); }
    .stat__num        { color: var(--accent); }
    .hard-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .08em;
      background: rgba(232,112,112,.12);
      color: #e87070;
      border: 1px solid rgba(232,112,112,.3);
      margin-bottom: 20px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .82rem;
      color: var(--text-lo);
      text-decoration: none;
      margin-top: 18px;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }
    .back-link:hover { color: var(--text-mid); background: var(--bg-elevated); }
  </style>
</head>
<body>

<main class="landing">

  <div class="landing__bg" aria-hidden="true">
    <span>難</span><span>読</span>
  </div>

  <div class="landing__inner">

    <div class="hard-badge" aria-label="難易度：ハードモード">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13"
           viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
      </svg>
      HARD MODE
    </div>

    <h1 class="landing__title">
      <span class="t-main">難読漢字</span>
      <span class="t-sub">ハードモード</span>
    </h1>

    <p class="landing__desc">
      難読漢字・超難問が揃った上級者向けクイズ！<br>
      読み問題10問・漢字問題5問、全15問。<br>
      本物の漢字力を証明しよう。
    </p>

    <div class="landing__stats" role="list">
      <div class="stat" role="listitem">
        <span class="stat__num">15</span>
        <span class="stat__lbl">難問</span>
      </div>
      <div class="stat__divider" aria-hidden="true"></div>
      <div class="stat" role="listitem">
        <span class="stat__num">4</span>
        <span class="stat__lbl">択</span>
      </div>
      <div class="stat__divider" aria-hidden="true"></div>
      <div class="stat" role="listitem">
        <span class="stat__num">3</span>
        <span class="stat__lbl">段階</span>
      </div>
    </div>

    <div class="landing__cta">
      <a href="/hard/quiz.html" class="btn btn--start" role="button">
        挑戦する
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
          viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
          aria-hidden="true">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </a>
    </div>

    <a href="/index.html" class="back-link">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
           viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      通常モードに戻る
    </a>

  </div>
</main>

<script src="../assets/js/footer.js"></script>
</body>
</html>
