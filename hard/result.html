<body id="hard">

<div class="result-page" id="js-result-page">

  <!-- ① スコアヒーロー -->
  <section class="result-hero">
    <p class="result-hero__eyebrow">RESULT</p>
    <div class="result-score-display">
      <span class="score-main" id="js-score-main">0</span>
      <span class="score-denom" id="js-score-denom">/ 10</span>
    </div>
    <p class="score-pct" id="js-score-pct">正答率 0%</p>
  </section>

  <!-- ② レベル称号 + 画像 + キャプション -->
  <section class="result-rank" id="js-rank-section">
    <div class="rank-img-wrap" id="js-rank-img-wrap">
      <img src="" alt="" id="js-rank-img"
           document.getElementById('js-rank-fallback').style.display='flex';">
      <div class="rank-img-wrap__fallback" id="js-rank-fallback" style="display:none">★</div>
    </div>
    <div>
      <span class="badge badge--rank" style="margin-bottom:10px" id="js-rank-badge">称号</span>
      <h2 class="rank-title" id="js-rank-title">―</h2>
      <p class="rank-caption" id="js-rank-caption"></p>
    </div>
  </section>

  <!-- ③ スコア内訳 (棒グラフ) -->
  <section class="result-section">
    <h3 class="section-title">スコア内訳</h3>
    <div class="score-bars">
      <!-- 読み -->
      <div class="score-bar-row">
        <div class="score-bar-meta">
          <span class="score-bar-label">
            <span class="badge badge--yomi" style="font-size:.72rem;padding:2px 8px">読み</span>
          </span>
          <span class="score-bar-val" id="js-yomi-val">0 / 10</span>
        </div>
        <div class="score-bar-track">
          <div class="score-bar-fill score-bar-fill--yomi" id="js-yomi-bar" style="width:0%"></div>
        </div>
      </div>

    </div>
  </section>

  <!-- ④ 問題ごとの正誤 + 解説 -->
  <section class="result-section">
    <h3 class="section-title">解説</h3>
    <div class="review-list" id="js-review-list">
      <!-- JS で生成 -->
    </div>
  </section>

  <!-- ⑤ シェアボタン -->
  <section class="share-section">
    <h3 class="share-title">結果をシェアする</h3>
    <div class="share-btns">
      <button class="share-btn share-btn--x" id="js-share-x" type="button">
        <!-- X (Twitter) icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
             viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        X
      </button>
      <button class="share-btn share-btn--bsky" id="js-share-bsky" type="button">
        <!-- Bluesky icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
             viewBox="0 0 360 320" fill="currentColor" aria-hidden="true">
          <path d="M180 142c-16.3-31.7-60.7-90.8-102-120C38 2 17.5 0 9.7 0 4.4 0 0 4 0 9v163c0 13.1 8.9 25 22.2 28.5L160 240v-98zM180 142c16.3-31.7 60.7-90.8 102-120 40-20 60.5-22 68.3-22 5.3 0 9.7 4 9.7 9v163c0 13.1-8.9 25-22.2 28.5L200 240v-98z"/>

        </svg>
        Bluesky
      </button>
    </div>
    <div class="result-retry">
      <a href="/hard/quiz.html" class="btn--retry">もう一度挑戦する</a>
    </div>
  </section>
