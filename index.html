<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="読み問題10問・漢字問題5問、全15問の漢字クイズに挑戦しよう！結果をXやBlueskyでシェアできます。">
  <meta property="og:title" content="漢字検定ゲーム">
  <meta property="og:description" content="全15問の漢字クイズに挑戦！あなたの漢字力を試そう。">
  <meta property="og:type" content="website">
  <title>漢字検定ゲーム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;600;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<main class="landing">

  <!-- Decorative background kanji -->
  <div class="landing__bg" aria-hidden="true">
    <span>漢</span><span>字</span>
  </div>

  <div class="landing__inner">

    <p class="landing__eyebrow">漢字力テスト</p>

    <h1 class="landing__title">
      <span class="t-main">漢字検定</span>
      <span class="t-sub">ゲーム</span>
    </h1>

    <p class="landing__desc">
      読み問題10問・漢字問題5問<br>
      全15問のクイズに挑戦しよう！<br>
      結果をSNSでシェアできます。
    </p>

    <div class="landing__stats" role="list">
      <div class="stat" role="listitem">
        <span class="stat__num">15</span>
        <span class="stat__lbl">問</span>
      </div>
      <div class="stat__divider" aria-hidden="true"></div>
      <div class="stat" role="listitem">
        <span class="stat__num">4</span>
        <span class="stat__lbl">択</span>
      </div>
      <div class="stat__divider" aria-hidden="true"></div>
      <div class="stat" role="listitem">
        <span class="stat__num">6</span>
        <span class="stat__lbl">段階</span>
      </div>
    </div>

    <div class="landing__cta">
      <a href="quiz.html" class="btn btn--start" role="button">
        挑戦する
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
          viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
          aria-hidden="true">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </a>
    </div>

    <p class="landing__hint">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13"
        viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        style="display:inline;vertical-align:middle;margin-right:4px"
        aria-hidden="true">
        <path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.7 5.5 4.5 9 5-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"></path>
      </svg>
      結果はX・Blueskyでシェアできます
    </p>

  </div>
</main>

</body>
</html>
